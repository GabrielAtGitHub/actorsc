name: CI

# Build + test on every push and on every pull request, so broken code is
# caught before it is committed to a shared branch and before a PR can merge.
on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes / PR updates).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (clang-18, C++20 modules)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          # clang-tools-18 provides clang-scan-deps, required by CMake to
          # build C++20 named modules.
          sudo apt-get install -y \
            clang-18 \
            clang-tools-18 \
            lld-18 \
            ninja-build

      - name: Tool versions
        run: |
          cmake --version
          ninja --version
          clang++-18 --version
          clang-scan-deps-18 --version

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=clang++-18
          -DCMAKE_C_COMPILER=clang-18

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 60
